name: Bug report
description: Report something that does not work as expected
title: "bug: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail to reproduce it.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact steps, commands, or OpenCode config.
      placeholder: |
        1. Install with ...
        2. Configure OpenCode with ...
        3. Run tool ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: Windows 11, Ubuntu 24.04, macOS
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: Python 3.12.4
  - type: input
    id: opencode
    attributes:
      label: OpenCode version
      placeholder: optional
  - type: textarea
    id: logs
    attributes:
      label: Logs
      render: text
